<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VexoOS</title>
<style>
  /* --- BASIC RESET --- */
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#1a1a1a;color:#e0e0e0;}

  /* --- PARTICLES --- */
  canvas#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

  /* --- DESKTOP --- */
  #desktop{position:relative;z-index:1;padding:20px;display:grid;grid-template-columns:repeat(auto-fill,80px);gap:20px;}

  /* --- APP ICONS --- */
  .app-icon{cursor:pointer;text-align:center;transition:all 0.2s;}
  .app-icon:hover{transform:scale(1.1);}
  .app-icon img{width:48px;height:48px;margin-bottom:5px;}

  /* --- TASKBAR --- */
  #taskbar{position:fixed;bottom:0;width:100%;height:55px;display:flex;justify-content:center;align-items:center;gap:20px;backdrop-filter:blur(10px);background:rgba(20,20,20,0.6);z-index:10;border-top:1px solid #00ffa3;}
  #start-btn{position:absolute;left:20px;cursor:pointer;font-size:24px;}

  /* --- START MENU --- */
  #start-menu{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:300px;background:rgba(20,20,20,0.95);border-radius:12px;padding:20px;display:none;box-shadow:0 0 20px #00ffa3;}
  #start-menu div{padding:10px;border-radius:8px;cursor:pointer;transition:all 0.2s;}
  #start-menu div:hover{background:rgba(0,255,163,0.1);}

  /* --- WINDOW --- */
  .window{position:absolute;width:600px;height:400px;background:rgba(20,20,20,0.9);border-radius:12px;display:none;flex-direction:column;overflow:hidden;backdrop-filter:blur(8px);box-shadow:0 0 20px #00ffa3;}
  .window-header{padding:10px;cursor:move;display:flex;justify-content:space-between;align-items:center;background:rgba(0,255,163,0.1);}
  .window-header span{font-weight:bold;color:#00ffa3;}
  .window-header button{background:none;border:none;color:#00ffa3;font-size:18px;cursor:pointer;}
  .window-content{flex:1;padding:10px;overflow:auto;}

  /* --- BUTTONS --- */
  button{cursor:pointer;}

  /* --- CONTEXT MENU --- */
  #context-menu{position:absolute;background:#222;padding:10px;display:none;z-index:999;border-radius:8px;}
  #context-menu div{padding:5px;cursor:pointer;}
  #context-menu div:hover{background:rgba(0,255,163,0.1);}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- DESKTOP ICONS -->
<div id="desktop">
  <div class="app-icon" onclick="openApp('vexo')"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png"><div>Vexo</div></div>
  <div class="app-icon" onclick="openApp('browser')"><img src="https://cdn-icons-png.flaticon.com/512/545/545705.png"><div>Browser</div></div>
  <div class="app-icon" onclick="openApp('notes')"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828304.png"><div>Notes</div></div>
  <div class="app-icon" onclick="openApp('calc')"><img src="https://cdn-icons-png.flaticon.com/512/992/992651.png"><div>Calculator</div></div>
  <div class="app-icon" onclick="openApp('files')"><img src="https://cdn-icons-png.flaticon.com/512/136/136522.png"><div>Files</div></div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
  <div id="start-btn" onclick="toggleStart()">🪟</div>
</div>

<!-- START MENU -->
<div id="start-menu">
  <div onclick="openApp('vexo')">Vexo</div>
  <div onclick="openApp('browser')">Browser</div>
  <div onclick="openApp('notes')">Notes</div>
  <div onclick="openApp('calc')">Calculator</div>
  <div onclick="openApp('files')">Files</div>
</div>

<!-- WINDOWS -->
<div class="window" id="vexo">
  <div class="window-header"><span>Vexo</span><div><button onclick="closeApp('vexo')">&times;</button></div></div>
  <div class="window-content" style="display:flex;flex-direction:column;gap:5px;">
    <a href="#" onclick="openBrowser('https://www.mediafire.com/file/1hqtjm6a07i76rn/Eagler.zip/file')">Minecraft Downloads</a>
    <a href="#" onclick="openBrowser('https://turtletown71.github.io')">Minecraft (beta-22w22b)</a>
    <a href="#" onclick="openBrowser('https://orange1.freeddns.us')">Fern</a>
    <a href="#" onclick="openBrowser('https://overcloak.plyrnation.martinwguy.net')">OPEN WEB</a>
    <a href="#" onclick="openBrowser('https://basketball-stars-game.github.io/')">Games</a>
    <a href="#" onclick="openBrowser('https://unblockedgames76-pro.github.io')">Unblocked Games</a>
    <a href="#" onclick="openBrowser('https://pn.martinwguy.net')">More Unblocked Games</a>
    <a href="#" onclick="openBrowser('https://ramen-boi772.github.io/launcher-le-eaglercraft/')">Launcher Le EaglerCraft</a>
    <a href="#" onclick="openBrowser('https://ramen-boi772.github.io/windows-12/desktop.html')">Win 12 (WEB)</a>
  </div>
</div>

<div class="window" id="browser">
  <div class="window-header"><span>Browser</span><div><button onclick="closeApp('browser')">&times;</button></div></div>
  <div class="window-content" style="display:flex;flex-direction:column;height:100%;">
    <div style="display:flex;gap:5px;padding-bottom:5px;">
      <button onclick="goBack()">←</button>
      <button onclick="goForward()">→</button>
      <button onclick="reloadPage()">⟳</button>
      <input id="browser-url" placeholder="Enter URL..." style="flex:1;padding:5px;">
      <button onclick="loadURL()">Go</button>
    </div>
    <iframe id="browser-frame" style="flex:1;border:none;"></iframe>
  </div>
</div>

<div class="window" id="notes">
  <div class="window-header"><span>Notes</span><div><button onclick="closeApp('notes')">&times;</button></div></div>
  <div class="window-content"><textarea id="note" style="width:100%;height:100%"></textarea></div>
</div>

<div class="window" id="calc">
  <div class="window-header"><span>Calculator</span><div><button onclick="closeApp('calc')">&times;</button></div></div>
  <div class="window-content">
    <input id="calcDisplay" style="width:100%">
    <div style="display:flex;gap:5px;margin-top:5px;">
      <button onclick="calc('1')">1</button>
      <button onclick="calc('2')">2</button>
      <button onclick="calc('+')">+</button>
      <button onclick="solve()">=</button>
    </div>
  </div>
</div>

<div class="window" id="files">
  <div class="window-header"><span>Files</span><div><button onclick="closeApp('files')">&times;</button></div></div>
  <div class="window-content" id="fileArea"></div>
</div>

<script>
/* --- START MENU --- */
function toggleStart(){
  let m=document.getElementById("start-menu");
  m.style.display = m.style.display==="block"?"none":"block";
}

/* --- OPEN/CLOSE APP --- */
function openApp(id){document.getElementById(id).style.display="flex";}
function closeApp(id){document.getElementById(id).style.display="none";}

/* --- BROWSER --- */
const browserFrame=document.getElementById("browser-frame");
const browserURL=document.getElementById("browser-url");
function loadURL(){
  let url=browserURL.value.trim();
  if(!url.startsWith("http")) url="https://"+url;
  browserFrame.src=url;
}
function openBrowser(url){
  openApp("browser");
  browserFrame.src=url;
  browserURL.value=url;
}
function goBack(){browserFrame.contentWindow.history.back();}
function goForward(){browserFrame.contentWindow.history.forward();}
function reloadPage(){browserFrame.contentWindow.location.reload();}

/* --- DRAG WINDOWS --- */
document.querySelectorAll(".window-header").forEach(h=>{
  let w=h.parentElement;
  h.onmousedown=e=>{
    let x=e.clientX-w.offsetLeft;
    let y=e.clientY-w.offsetTop;
    document.onmousemove=e=>{
      w.style.left=e.clientX-x+"px";
      w.style.top=e.clientY-y+"px";
    }
    document.onmouseup=()=>document.onmousemove=null;
  };
});

/* --- NOTES --- */
let note=document.getElementById("note");
note.value=localStorage.getItem("note")||"";
note.oninput=()=>localStorage.setItem("note",note.value);

/* --- CALC --- */
function calc(v){calcDisplay.value+=v;}
function solve(){calcDisplay.value=eval(calcDisplay.value);}

/* --- FILES --- */
let fs={Documents:["Resume.txt","Project.txt"],Images:["Pic.png"]};
function renderFiles(){
  let area=document.getElementById("fileArea"); area.innerHTML="";
  for(let f in fs){
    let d=document.createElement("div"); d.innerText=f;
    d.onclick=()=>alert(fs[f].join(", "));
    area.appendChild(d);
  }
}
renderFiles();

/* --- RIGHT CLICK MENU --- */
document.addEventListener("contextmenu",e=>{
  e.preventDefault();
  let m=document.getElementById("context-menu");
  m.style.left=e.pageX+"px"; m.style.top=e.pageY+"px"; m.style.display="block";
});
document.addEventListener("click",()=>document.getElementById("context-menu")?.style.display="none");

/* --- PARTICLES --- */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth; canvas.height=innerHeight;
let particles=[];
for(let i=0;i<80;i++){
  particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1});
}
function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let p of particles){
    p.x+=Math.random()-0.5; p.y+=Math.random()-0.5;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle="#00ffa3"; ctx.fill();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();
</script>

</body>
</html>
