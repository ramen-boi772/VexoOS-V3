<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VexoOS</title>
<style>
  /* ===== Desktop & Background ===== */
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
    color: #e0e0e0;
  }

  canvas#particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  #desktop {
    position: relative;
    width: 100%;
    height: 100%;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    padding: 20px;
    box-sizing: border-box;
  }

  /* ===== App Icons ===== */
  .app-icon {
    width: 100px;
    height: 100px;
    margin: 15px;
    text-align: center;
    cursor: pointer;
    border-radius: 12px;
    background: rgba(0,255,163,0.05);
    border: 1px solid rgba(0,255,163,0.3);
    backdrop-filter: blur(5px);
    transition: all 0.3s ease;
  }

  .app-icon:hover {
    transform: translateY(-5px);
    background: rgba(0,255,163,0.1);
    box-shadow: 0 6px 20px rgba(0,255,163,0.2);
  }

  .app-icon img {
    width: 60%;
    margin-top: 12px;
  }

  .app-icon span {
    display: block;
    margin-top: 8px;
    font-size: 0.9em;
    color: #00ffa3;
  }

  /* ===== Windows ===== */
  .window {
    position: absolute;
    width: 600px;
    height: 400px;
    background: rgba(0,0,0,0.85);
    border-radius: 12px;
    border: 1px solid rgba(0,255,163,0.3);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,255,163,0.2);
    overflow: hidden;
    display: none;
    flex-direction: column;
  }

  .window-header {
    height: 40px;
    background: rgba(0,255,163,0.05);
    display: flex;
    align-items: center;
    padding: 0 10px;
    cursor: move;
  }

  .window-header span {
    color: #00ffa3;
    font-weight: bold;
  }

  .window-close {
    margin-left: auto;
    cursor: pointer;
    font-weight: bold;
    color: #ff4c4c;
  }

  .window-content {
    flex: 1;
    background: #1a1a1a;
    color: #fff;
    overflow: auto;
  }

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="desktop">
  <div class="app-icon" data-app="minecraft">
    <img src="https://cdn-icons-png.flaticon.com/512/49/49339.png" alt="Minecraft">
    <span>Minecraft</span>
  </div>

  <div class="app-icon" data-app="win12">
    <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png" alt="Win12">
    <span>Win 12</span>
  </div>

  <div class="app-icon" data-app="vexoos">
    <img src="https://cdn-icons-png.flaticon.com/512/1250/1250615.png" alt="VexoOS">
    <span>VexoOS</span>
  </div>
</div>

<!-- Windows for apps -->
<div class="window" id="minecraft-window">
  <div class="window-header"><span>Minecraft</span><div class="window-close">✕</div></div>
  <div class="window-content">
    <iframe src="https://turtletown71.github.io" style="width:100%;height:100%;border:none;"></iframe>
  </div>
</div>

<div class="window" id="win12-window">
  <div class="window-header"><span>Win 12</span><div class="window-close">✕</div></div>
  <div class="window-content">
    <iframe src="https://ramen-boi772.github.io/windows-12/desktop.html" style="width:100%;height:100%;border:none;"></iframe>
  </div>
</div>

<div class="window" id="vexoos-window">
  <div class="window-header"><span>VexoOS</span><div class="window-close">✕</div></div>
  <div class="window-content">
    <iframe src="https://ramen-boi772.github.io/VexoOS-V3/" style="width:100%;height:100%;border:none;"></iframe>
  </div>
</div>

<script>
/* ===== Particle System ===== */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particlesArray = [];
let mouseX = 0;
let mouseY = 0;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.baseSize = Math.random() * 3 + 1.5;
    this.size = this.baseSize;
    this.speedX = (Math.random() - 0.5) * 0.6;
    this.speedY = (Math.random() - 0.5) * 0.6;
    this.color = `rgba(0,255,163,${Math.random()*0.5 + 0.3})`;
    this.pulseAngle = Math.random() * Math.PI*2;
    this.pulseSpeed = Math.random()*0.03+0.01;
    this.pulseRange = Math.random()*1+0.5;
    this.depthFactor = Math.random()*0.2+0.1;
    this.swayOffset = Math.random()*1000;
  }
  update() {
    this.x += this.speedX + Math.sin(Date.now()*0.001 + this.swayOffset)*0.5;
    this.y += this.speedY + Math.cos(Date.now()*0.001 + this.swayOffset)*0.5;
    if(this.x<0)this.x=canvas.width;
    if(this.x>canvas.width)this.x=0;
    if(this.y<0)this.y=canvas.height;
    if(this.y>canvas.height)this.y=0;
    this.pulseAngle += this.pulseSpeed;
    this.size = this.baseSize + Math.sin(this.pulseAngle)*this.pulseRange;
    this.parallaxX = (mouseX-canvas.width/2)*this.depthFactor;
    this.parallaxY = (mouseY-canvas.height/2)*this.depthFactor;
  }
  draw() {
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(this.x+this.parallaxX,this.y+this.parallaxY,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function initParticles(count=80){
  particlesArray=[];
  for(let i=0;i<count;i++){
    particlesArray.push(new Particle());
  }
}

function connectParticles(maxDistance=120){
  for(let a=0;a<particlesArray.length;a++){
    for(let b=a+1;b<particlesArray.length;b++){
      const dx = (particlesArray[a].x+particlesArray[a].parallaxX)-(particlesArray[b].x+particlesArray[b].parallaxX);
      const dy = (particlesArray[a].y+particlesArray[a].parallaxY)-(particlesArray[b].y+particlesArray[b].parallaxY);
      const distance = Math.sqrt(dx*dx+dy*dy);
      if(distance<maxDistance){
        ctx.strokeStyle = `rgba(0,255,163,${1-distance/maxDistance})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(particlesArray[a].x+particlesArray[a].parallaxX,particlesArray[a].y+particlesArray[a].parallaxY);
        ctx.lineTo(particlesArray[b].x+particlesArray[b].parallaxX,particlesArray[b].y+particlesArray[b].parallaxY);
        ctx.stroke();
      }
    }
  }
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p=>{p.update();p.draw();});
  connectParticles();
  requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();

/* ===== Window Open/Close ===== */
const appIcons = document.querySelectorAll('.app-icon');
const windows = document.querySelectorAll('.window');

appIcons.forEach(icon => {
  icon.addEventListener('click', () => {
    const app = icon.dataset.app;
    const win = document.getElementById(`${app}-window`);
    win.style.display = 'flex';
    win.style.top = '50px';
    win.style.left = '50px';
  });
});

windows.forEach(win => {
  const close = win.querySelector('.window-close');
  close.addEventListener('click', () => win.style.display='none');
});

/* ===== Dragging Windows ===== */
let dragTarget = null;
let offsetX = 0;
let offsetY = 0;

document.addEventListener('mousedown', e => {
  if(e.target.classList.contains('window-header') || e.target.parentElement.classList.contains('window-header')){
    dragTarget = e.target.closest('.window');
    offsetX = e.clientX - dragTarget.offsetLeft;
    offsetY = e.clientY - dragTarget.offsetTop;
  }
});

document.addEventListener('mousemove', e => {
  if(dragTarget){
    dragTarget.style.left = `${e.clientX-offsetX}px`;
    dragTarget.style.top = `${e.clientY-offsetY}px`;
  }
});

document.addEventListener('mouseup', ()=> dragTarget=null);

</script>
</body>
</html>
